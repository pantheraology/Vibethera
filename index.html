<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vibethera</title>
    <meta name="description" content="AI UI Generator Interface" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              "primary-background": "#0a0a0a",
              "surface": "#1a1a1a",
              "surface-elevated": "#2a2a2a",
              "surface-secondary": "#181818",
              "text-primary": "#ffffff",
              "text-secondary": "#a0a0a0",
              "text-muted": "#666666",
              "text-accent": "#00ff88",
              "interactive-primary": "#ffffff",
              "interactive-secondary": "#666666",
              "interactive-hover": "#333333",
              "interactive-active": "#444444",
              "interactive-border": "#333333",
              "status-success": "#00ff88",
              "status-warning": "#ffaa00",
              "status-error": "#ff4444",
              "status-info": "#0088ff",
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0a0a0a;
        color: #ffffff;
        overflow: hidden; /* Prevent body scroll, handle in components */
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }
    </style>

    "@google/genai": "https://esm.sh/@google/genai"
  }
}
</script>
